<!DOCTYPE html>
<html lang="id">
<head>
    <title>Interactive Table</title>
    <style>
        table {
            border-collapse: collapse;
            width: 50%;
        }
        th, td {
            border: 1px solid black;
            padding: 8px;
            text-align: center;
        }
        tr:hover {
            background-color: #ddd;
            cursor: pointer;
        }
        button {
            padding: 5px 10px;
        }
    </style>
</head>
<body>

<h2>Table Interaktif</h2>
<div id="app"></div>

<script>
    // ✅ DATA
    const data = [
        { id: 1, nama: "satu" },
        { id: 2, nama: "dua" },
        { id: 3, nama: "tiga" }
    ];

    // ✅ METHOD: aksi saat klik
    function handleClick(item) {
        alert(`Kamu klik: ${item.nama}`);
        console.log(item);
    }

    // ✅ render header (reusable)
    function renderHeader(keys) {
        return `
            <tr>
                ${keys.map(k => `<th>${k.toUpperCase()}</th>`).join('')}
                <th>AKSI</th>
            </tr>
        `;
    }

    // ✅ render rows (modular + DRY)
    function renderRows(data, keys) {
        return data.map((item, index) => `
            <tr onclick="handleClick(${index})">
                ${keys.map(k => `<td>${item[k]}</td>`).join('')}
                <td>
                    <button onclick="handleButton(event, ${index})">Klik</button>
                </td>
            </tr>
        `).join('');
    }

    // ✅ handle button (biar tidak double trigger row)
    function handleButton(event, index) {
        event.stopPropagation();
        handleClick(data[index]);
    }

    // ✅ render table utama
    function renderTable(data) {
        const keys = Object.keys(data[0]);

        return `
            <table>
                <thead>${renderHeader(keys)}</thead>
                <tbody>${renderRows(data, keys)}</tbody>
            </table>
        `;
    }

    // render ke DOM
    document.getElementById("app").innerHTML = renderTable(data);
</script>

</body>
</html>
