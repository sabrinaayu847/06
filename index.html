<!DOCTYPE html>
<html lang="id">
<head>
    <title>Multi Render UI</title>
    <style>
        .card {
            border: 1px solid #333;
            padding: 10px;
            margin: 5px;
            display: inline-block;
        }
        ul { padding: 0; }
        li { list-style: none; margin: 5px 0; }
        .menu a {
            margin-right: 10px;
            cursor: pointer;
            color: blue;
        }
    </style>
</head>
<body>

<h2>Menu</h2>
<div id="menu"></div>

<h2>Output</h2>
<div id="app"></div>

<script>
    // DATA (scalable)
    const data = Array.from({ length: 9 }, (_, i) => ({
        id: i + 1,
        nama: ["satu","dua","tiga","empat","lima","enam","tujuh","delapan","sembilan"][i]
    }));

    // =========================
    // RENDER METHODS
    // =========================

    // TABLE
    function renderTable(data) {
        return `
            <table border="1">
                <tr><th>ID</th><th>NAMA</th></tr>
                ${data.map(d => `
                    <tr>
                        <td>${d.id}</td>
                        <td>${d.nama}</td>
                    </tr>
                `).join('')}
            </table>
        `;
    }

    // CARD
    function renderCard(data) {
        return data.map(d => `
            <div class="card">
                <h4>${d.nama}</h4>
                <p>ID: ${d.id}</p>
            </div>
        `).join('');
    }

    // LIST
    function renderList(data) {
        return `
            <ul>
                ${data.map(d => `<li>${d.id} - ${d.nama}</li>`).join('')}
            </ul>
        `;
    }

    // MENU (klik untuk ganti render)
    function renderMenu() {
        return `
            <div class="menu">
                <a onclick="show('table')">Table</a>
                <a onclick="show('card')">Card</a>
                <a onclick="show('list')">List</a>
            </div>
        `;
    }

    // =========================
    // CONTROLLER (modular)
    // =========================

    function show(type) {
        let html = '';

        if (type === 'table') html = renderTable(data);
        if (type === 'card') html = renderCard(data);
        if (type === 'list') html = renderList(data);

        document.getElementById("app").innerHTML = html;
    }

    // =========================
    // INIT
    // =========================

    function init() {
        document.getElementById("menu").innerHTML = renderMenu();
        show('table'); // default
    }

    init();
</script>

</body>
</html>
