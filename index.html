<!DOCTYPE html>
<html lang="id">
<head>
    <title>Render 5 Menu</title>
    <style>
        body {
            font-family: Arial;
            background: #f5f7fa;
            padding: 20px;
        }

        .menu {
            margin-bottom: 20px;
        }

        .menu button {
            padding: 10px 15px;
            margin-right: 10px;
            border: none;
            background: #4a90e2;
            color: white;
            border-radius: 6px;
            cursor: pointer;
        }

        .box {
            background: white;
            padding: 20px;
            border-radius: 10px;
        }

        /* table */
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th {
            background: #4a90e2;
            color: white;
            padding: 10px;
        }
        td {
            padding: 8px;
            border-bottom: 1px solid #ddd;
            text-align: center;
        }

        /* card */
        .card-container {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
        }
        .card {
            background: #4a90e2;
            color: white;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
        }

        /* list */
        li {
            list-style: none;
            background: #eef3f8;
            margin: 5px 0;
            padding: 8px;
            border-radius: 6px;
        }

        /* menu angka */
        .menu-angka {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .menu-angka div {
            background: #4a90e2;
            color: white;
            padding: 10px 15px;
            border-radius: 6px;
        }
    </style>
</head>
<body>

<h2>Menu</h2>
<div id="menu"></div>

<div id="app"></div>

<script>
    // DATA
    const data = Array.from({ length: 9 }, (_, i) => ({
        id: i + 1,
        nama: ["satu","dua","tiga","empat","lima","enam","tujuh","delapan","sembilan"][i]
    }));

    // =========================
    // RENDER METHODS
    // =========================

    function renderMenuAngka(data) {
        return `
        <div class="box">
            <div class="menu-angka">
                ${data.map(d => `<div>${d.id}</div>`).join('')}
            </div>
        </div>`;
    }

    function renderArray(data) {
        return `<div class="box"><pre>${JSON.stringify(data, null, 2)}</pre></div>`;
    }

    function renderTable(data) {
        return `
        <div class="box">
            <table>
                <tr><th>ID</th><th>Nama</th></tr>
                ${data.map(d => `
                    <tr>
                        <td>${d.id}</td>
                        <td>${d.nama}</td>
                    </tr>
                `).join('')}
            </table>
        </div>`;
    }

    function renderCard(data) {
        return `
        <div class="box">
            <div class="card-container">
                ${data.map(d => `
                    <div class="card">
                        <h4>${d.nama}</h4>
                        <p>${d.id}</p>
                    </div>
                `).join('')}
            </div>
        </div>`;
    }

    function renderList(data) {
        return `
        <div class="box">
            <ul>
                ${data.map(d => `<li>${d.id} - ${d.nama}</li>`).join('')}
            </ul>
        </div>`;
    }

    // =========================
    // CONTROLLER
    // =========================

    function show(type) {
        let html = '';

        if (type === 'menu') html = renderMenuAngka(data);
        if (type === 'array') html = renderArray(data);
        if (type === 'table') html = renderTable(data);
        if (type === 'card') html = renderCard(data);
        if (type === 'list') html = renderList(data);

        document.getElementById("app").innerHTML = html;
    }

    // =========================
    // BUTTON MENU
    // =========================

    function renderMenu() {
        return `
            <div class="menu">
                <button onclick="show('menu')">Menu</button>
                <button onclick="show('array')">Array</button>
                <button onclick="show('table')">Table</button>
                <button onclick="show('card')">Card</button>
                <button onclick="show('list')">List</button>
            </div>
        `;
    }

    // INIT
    document.getElementById("menu").innerHTML = renderMenu();
    show('menu');
</script>

</body>
</html>
